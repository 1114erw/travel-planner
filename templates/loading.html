<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在生成您的专属旅行攻略...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loading-container {
            background: white;
            border-radius: 30px;
            padding: 60px 50px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }
        .main-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-right-color: #764ba2;
            border-radius: 50%;
            margin: 0 auto 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            animation: progressAnim 10s ease-in-out infinite;
        }
        @keyframes progressAnim {
            0% { width: 0%; }
            100% { width: 95%; }
        }
        .progress-text {
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }
        .status-cards {
            text-align: left;
            margin-bottom: 25px;
        }
        .status-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .status-icon { font-size: 20px; }
        .status-title { font-size: 14px; color: #333; font-weight: 600; }
        .cancel-btn {
            padding: 12px 30px;
            background: transparent;
            border: 2px solid #ddd;
            border-radius: 25px;
            color: #666;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .cancel-btn:hover {
            border-color: #999;
            color: #333;
        }
        .update-time {
            font-size: 11px;
            color: #999;
            margin-top: 12px;
            padding: 4px 12px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            display: inline-block;
        }
        .live-clock {
            font-size: 13px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .estimated-time {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }
        .estimated-time .time-icon {
            font-size: 18px;
        }
        .estimated-time .time-text {
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="main-icon">✈️</div>
        <h1>AI正在为您规划旅程</h1>
        <p class="subtitle">正在生成您的专属旅行攻略，请稍候...</p>
        <div class="live-clock" id="live-clock">⏰ 正在获取当前时间...</div>
        
        <!-- 预计耗时显示 -->
        <div class="estimated-time" id="estimated-time">
            <span class="time-icon">⏱️</span>
            <span class="time-text">预计生成时间：计算中...</span>
        </div>
        
        <div class="spinner"></div>
        
        <div class="progress-text" id="progressText">准备中...</div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <div class="status-cards">
            <div class="status-card"><span class="status-icon">📍</span><span class="status-title">分析目的地信息</span></div>
            <div class="status-card"><span class="status-icon">🏨</span><span class="status-title">匹配推荐酒店</span></div>
            <div class="status-card"><span class="status-icon">🎯</span><span class="status-title">规划行程路线</span></div>
            <div class="status-card"><span class="status-icon">📝</span><span class="status-title">生成攻略详情</span></div>
        </div>
        
        <button class="cancel-btn" onclick="cancelGeneration()">取消生成</button>
    </div>
    
    <script>
        // 根据用户信息估算生成时间
        function calculateEstimatedTime() {
            const formDataStr = localStorage.getItem('tripFormData');
            
            // 分解各阶段耗时
            let estimatedSeconds = 0;
            let days = 3;
            let style = 'normal';
            
            if (formDataStr) {
                try {
                    const formData = JSON.parse(formDataStr);
                    days = formData.days || 3;
                    const people = formData.people || 2;
                    style = formData.style || 'normal';
                    const transport = formData.transport || 'train';
                    
                    // 1. AI生成核心攻略（最大头）- 根据旅行复杂度调整
                    estimatedSeconds += 6; // 基础AI调用时间
                    
                    // 根据旅行天数：天数越多，AI需要生成的内容越多
                    estimatedSeconds += days * 1.5;
                    
                    // 根据旅行人数：人数影响酒店房间配置和预算计算
                    estimatedSeconds += Math.min(people - 1, 4) * 0.4;
                    
                    // 根据旅行风格：奢华型需要更细致的酒店筛选
                    if (style === '奢华型') {
                        estimatedSeconds += 2;
                    } else if (style === '经济型') {
                        estimatedSeconds -= 0.5;
                    }
                    
                    // 根据交通方式：自驾需要路线规划
                    if (transport === '自驾' || transport === 'zijiache') {
                        estimatedSeconds += 3;
                    } else if (transport === '飞机' || transport === 'feiji') {
                        estimatedSeconds += 1;
                    }
                } catch (e) {
                    console.error('解析表单数据失败:', e);
                    // 使用默认值
                    estimatedSeconds += 6;
                }
            }
            
            // 2. 天气数据获取（固定）
            estimatedSeconds += 1.5;
            
            // 3. 景点信息获取（每天约2个景点）
            estimatedSeconds += days * 2 * 0.3;
            
            // 4. 图片API调用（重要！）
            // 每天约2个景点图片 + 1个目的地封面图 + 酒店图片
            const totalImages = days * 2 + 1 + 3; // 景点图 + 封面 + 酒店图
            // 每张图片约6-8秒（网络请求 + 图片生成/获取）
            const imageTime = totalImages * (6 + Math.random() * 2);
            estimatedSeconds += imageTime;
            
            // 5. 酒店搜索和匹配
            estimatedSeconds += 2.5;
            if (style === '奢华型') {
                estimatedSeconds += 1.5;
            }
            
            // 6. 交通方案查询（火车票/机票）
            estimatedSeconds += 2;
            
            // 7. HTML生成和格式化
            estimatedSeconds += 1;
            
            // 网络延迟和处理开销
            estimatedSeconds += Math.random() * 2 + 1;
            
            // 限制合理范围：最小30秒，最大120秒
            estimatedSeconds = Math.max(30, Math.min(120, estimatedSeconds));
            
            // 更新显示
            const timeEl = document.getElementById('estimated-time');
            if (timeEl) {
                const seconds = Math.round(estimatedSeconds);
                if (seconds < 60) {
                    timeEl.innerHTML = `<span class="time-icon">⏱️</span><span class="time-text">预计生成时间：约 ${seconds} 秒</span>`;
                } else {
                    const minutes = Math.floor(seconds / 60);
                    const remainingSeconds = seconds % 60;
                    if (remainingSeconds > 0) {
                        timeEl.innerHTML = `<span class="time-icon">⏱️</span><span class="time-text">预计生成时间：约 ${minutes}分${remainingSeconds}秒</span>`;
                    } else {
                        timeEl.innerHTML = `<span class="time-icon">⏱️</span><span class="time-text">预计生成时间：约 ${minutes} 分钟</span>`;
                    }
                }
            }
            
            return estimatedSeconds;
        }

        // 实时时钟
        function updateClock() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const clockEl = document.getElementById('live-clock');
            if (clockEl) {
                clockEl.textContent = `⏰ ${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
            }
        }
        
        // 获取最后更新时间
        function fetchLastUpdate() {
            fetch('/api/last-update')
                .then(response => response.json())
                .then(data => {
                    if (data.last_update_time) {
                        // 创建更新时间显示元素
                        const container = document.querySelector('.loading-container');
                        if (container && !document.getElementById('last-update-display')) {
                            const updateEl = document.createElement('div');
                            updateEl.id = 'last-update-display';
                            updateEl.className = 'update-time';
                            updateEl.textContent = `💾 最后更新: ${data.last_update_time}`;
                            container.appendChild(updateEl);
                        }
                    }
                })
                .catch(error => {
                    console.error('获取更新时间失败:', error);
                });
        }
        
        const progressLabels = ['准备中...', '分析目的地信息...', '匹配推荐酒店...', '规划行程路线...', '生成攻略详情...', '即将完成...'];
        const progressText = document.getElementById('progressText');
        let labelIndex = 0;
        
        setInterval(() => {
            labelIndex = (labelIndex + 1) % progressLabels.length;
            progressText.textContent = progressLabels[labelIndex];
        }, 1500);
        
        function cancelGeneration() {
            if (confirm('确定要取消生成旅行攻略吗？')) {
                localStorage.removeItem('tripFormData');
                window.location.href = '/';
            }
        }
        
        function startGeneration() {
            const formDataStr = localStorage.getItem('tripFormData');
            if (!formDataStr) {
                alert('未找到行程信息，请重新填写');
                window.location.href = '/';
                return;
            }
            
            fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: formDataStr
            })
            .then(response => response.json())
            .then(data => {
                if (data.success && data.preview_url) {
                    window.location.href = data.preview_url;
                } else {
                    alert('生成失败: ' + (data.message || data.error || '未知错误'));
                    window.location.href = '/';
                }
            })
            .catch(error => {
                console.error('请求失败:', error);
                alert('网络错误，请重试');
                window.location.href = '/';
            });
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            updateClock();
            setInterval(updateClock, 1000);
            calculateEstimatedTime();
            startGeneration();
        });
        
        // 直接设置更新时间，不需要API请求
        document.addEventListener('DOMContentLoaded', () => {
            const updateEl = document.createElement('div');
            updateEl.id = 'last-update-display';
            updateEl.className = 'update-time';
            updateEl.textContent = '💾 最后更新: 2026-06-04 20:34:21';
            document.querySelector('.loading-container').appendChild(updateEl);
        });
    </script>
</body>
</html>
